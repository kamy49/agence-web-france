<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientFull1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientFull2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo mark -->
  <g transform="translate(40, 50)">
    <!-- Background rounded square -->
    <rect width="100" height="100" rx="20" fill="url(#gradientFull1)"/>
    
    <!-- Tech geometric design -->
    <g transform="translate(50, 50)">
      <!-- Outer circle accent -->
      <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
      
      <!-- Stylized W-Z fusion design -->
      <!-- Left wing of W -->
      <path d="M -21 -15 L -11 12 L -9 -15" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Center peak -->
      <path d="M -9 -17 L 0 9 L 9 -17" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Right wing of W -->
      <path d="M 9 -15 L 19 12 L 21 -15" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Tech accent lines - diagonal Z elements -->
      <line x1="-17" y1="-9" x2="17" y2="-9" stroke="white" stroke-width="1.2" opacity="0.6"/>
      <line x1="-12" y1="3" x2="12" y2="3" stroke="white" stroke-width="1.2" opacity="0.6"/>
      <line x1="-17" y1="15" x2="17" y2="15" stroke="white" stroke-width="1.2" opacity="0.6"/>
      
      <!-- Corner tech accents -->
      <circle cx="-19" cy="-19" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="19" cy="-19" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="-19" cy="19" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="19" cy="19" r="1.5" fill="white" opacity="0.8"/>
      
      <!-- Inner circuit-like elements -->
      <path d="M 0 -24 L 0 -12" stroke="white" stroke-width="1" opacity="0.5"/>
      <path d="M -24 0 L -12 0" stroke="white" stroke-width="1" opacity="0.5"/>
      <path d="M 0 21 L 0 30" stroke="white" stroke-width="1" opacity="0.5"/>
      <path d="M 12 0 L 24 0" stroke="white" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Text Logo -->
  <text x="160" y="75" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-0.5">
    WebZynth
  </text>
  
  <!-- Tagline -->
  <text x="160" y="105" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#64748B" letter-spacing="0.5">
    AGENCE WEB
  </text>
  
  <!-- Gradient underline -->
  <line x1="160" y1="120" x2="400" y2="120" stroke="url(#gradientFull2)" stroke-width="2"/>
</svg>
